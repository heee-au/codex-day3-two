<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light" />
    <title>오늘의 추천</title>
    <style>
      :root {
        --bg: #f5f7fb;
        --bg-strong: #edf2ff;
        --surface: rgba(255, 255, 255, 0.82);
        --surface-strong: rgba(255, 255, 255, 0.96);
        --line: rgba(42, 61, 116, 0.12);
        --line-strong: rgba(42, 61, 116, 0.18);
        --text: #10182f;
        --muted: rgba(16, 24, 47, 0.64);
        --muted-strong: rgba(16, 24, 47, 0.8);
        --accent: #3e63f3;
        --accent-soft: rgba(62, 99, 243, 0.12);
        --accent-2: #21b6a8;
        --shadow: 0 20px 50px rgba(30, 45, 90, 0.08);
        --shadow-strong: 0 28px 70px rgba(30, 45, 90, 0.12);
      }

      * {
        box-sizing: border-box;
      }

      html {
        scroll-behavior: smooth;
        color-scheme: light;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: Inter, "Noto Sans KR", "Apple SD Gothic Neo", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at 12% 12%, rgba(62, 99, 243, 0.14), transparent 22%),
          radial-gradient(circle at 82% 18%, rgba(33, 182, 168, 0.12), transparent 22%),
          radial-gradient(circle at 58% 100%, rgba(62, 99, 243, 0.08), transparent 26%),
          linear-gradient(180deg, #f8faff 0%, var(--bg) 42%, #f2f6fd 100%);
        overflow-x: hidden;
      }

      body::before {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        background-image:
          linear-gradient(rgba(16, 24, 47, 0.035) 1px, transparent 1px),
          linear-gradient(90deg, rgba(16, 24, 47, 0.035) 1px, transparent 1px);
        background-size: 72px 72px;
        mask-image: radial-gradient(circle at center, black 44%, transparent 100%);
        opacity: 0.55;
        z-index: 0;
      }

      body::after {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        background:
          radial-gradient(circle at center, transparent 48%, rgba(244, 247, 252, 0.16) 100%),
          linear-gradient(180deg, rgba(255, 255, 255, 0.2), transparent 16%, transparent 84%, rgba(255, 255, 255, 0.16));
        z-index: 0;
      }

      .page {
        position: relative;
        z-index: 1;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        gap: 2rem;
        padding: clamp(1rem, 2vw, 2rem);
      }

      .page-inner {
        width: min(100%, 1200px);
        margin: 0 auto;
      }

      .hero {
        position: relative;
        overflow: hidden;
        border: 1px solid var(--line);
        border-radius: 32px;
        padding: clamp(1.25rem, 3.2vw, 3rem);
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.86), rgba(247, 250, 255, 0.76)),
          radial-gradient(circle at 15% 0%, rgba(62, 99, 243, 0.1), transparent 36%),
          radial-gradient(circle at 100% 0%, rgba(33, 182, 168, 0.08), transparent 30%);
        box-shadow: var(--shadow-strong);
      }

      .hero::before {
        content: "";
        position: absolute;
        inset: 0;
        background:
          linear-gradient(135deg, rgba(62, 99, 243, 0.08), transparent 24%, transparent 76%, rgba(33, 182, 168, 0.06)),
          linear-gradient(180deg, rgba(255, 255, 255, 0.3), transparent 18%);
        pointer-events: none;
      }

      .hero-grid {
        position: relative;
        display: grid;
        grid-template-columns: minmax(0, 1.35fr) minmax(280px, 0.95fr);
        gap: clamp(1.5rem, 3vw, 3rem);
        align-items: end;
      }

      .eyebrow {
        margin: 0 0 0.8rem;
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        padding: 0.5rem 0.8rem;
        border-radius: 999px;
        border: 1px solid rgba(62, 99, 243, 0.14);
        background: rgba(62, 99, 243, 0.08);
        color: var(--accent);
        font-size: 0.78rem;
        font-weight: 700;
        letter-spacing: 0.14em;
        text-transform: uppercase;
      }

      .eyebrow::before {
        content: "";
        width: 0.5rem;
        height: 0.5rem;
        border-radius: 50%;
        background: var(--accent);
        box-shadow: 0 0 0 0.22rem rgba(62, 99, 243, 0.12);
      }

      .hero-title {
        margin: 0;
        font-size: clamp(3rem, 7vw, 6.6rem);
        line-height: 0.96;
        letter-spacing: -0.09em;
        text-wrap: balance;
      }

      .hero-title strong {
        display: inline-block;
        background: linear-gradient(90deg, #10182f 0%, #203574 46%, #3e63f3 100%);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
      }

      .hero-copy {
        margin: 1rem 0 0;
        max-width: 34rem;
        color: var(--muted-strong);
        font-size: clamp(1rem, 1.45vw, 1.12rem);
        line-height: 1.75;
      }

      .hero-aside {
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        gap: 0.9rem;
        padding: 1.25rem;
        border-radius: 24px;
        border: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.64);
        box-shadow: var(--shadow);
      }

      .date-label {
        margin: 0;
        color: var(--muted);
        font-size: 0.8rem;
        font-weight: 700;
        letter-spacing: 0.18em;
        text-transform: uppercase;
      }

      .date-value {
        margin: 0;
        font-size: clamp(1.2rem, 2vw, 1.7rem);
        line-height: 1.2;
        letter-spacing: -0.05em;
      }

      .date-note {
        margin: 0;
        color: var(--muted);
        line-height: 1.65;
        font-size: 0.95rem;
      }

      .section {
        display: grid;
        gap: 1rem;
      }

      .section-head {
        display: flex;
        align-items: end;
        justify-content: space-between;
        gap: 1rem;
        width: 100%;
      }

      .section-title {
        margin: 0;
        font-size: clamp(1.2rem, 2vw, 1.5rem);
        letter-spacing: -0.05em;
      }

      .section-subtitle {
        margin: 0;
        color: var(--muted);
        font-size: 0.95rem;
        line-height: 1.6;
      }

      .recommend-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 1rem;
      }

      .recommend-slot {
        min-height: 220px;
        border-radius: 24px;
        border: 1.5px solid rgba(42, 61, 116, 0.12);
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.88), rgba(244, 248, 255, 0.7)),
          linear-gradient(135deg, rgba(62, 99, 243, 0.04), transparent 38%, transparent 62%, rgba(33, 182, 168, 0.04));
        box-shadow: 0 18px 34px rgba(30, 45, 90, 0.06);
        position: relative;
        overflow: hidden;
        transition: transform 180ms ease, border-color 180ms ease, box-shadow 180ms ease;
      }

      .recommend-slot::before {
        content: "";
        position: absolute;
        inset: 0;
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.55), transparent 30%),
          radial-gradient(circle at top left, rgba(62, 99, 243, 0.08), transparent 32%);
        pointer-events: none;
      }

      .recommend-slot:hover {
        transform: translateY(-2px);
        border-color: rgba(62, 99, 243, 0.24);
        box-shadow: 0 24px 48px rgba(30, 45, 90, 0.09);
      }

      .recommend-slot:focus-visible {
        outline: 3px solid rgba(62, 99, 243, 0.35);
        outline-offset: 4px;
      }

      .footer {
        width: min(100%, 1200px);
        margin: auto auto 0;
        padding: 0 0.25rem 0.25rem;
        display: flex;
        flex-wrap: wrap;
        justify-content: space-between;
        gap: 0.75rem 1rem;
        color: rgba(16, 24, 47, 0.58);
        font-size: 0.78rem;
        letter-spacing: 0.1em;
        text-transform: uppercase;
      }

      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }

      @media (max-width: 900px) {
        .hero-grid {
          grid-template-columns: 1fr;
        }

        .hero-aside {
          align-items: flex-start;
        }

        .section-head {
          align-items: flex-start;
          flex-direction: column;
        }
      }

      @media (max-width: 700px) {
        .page {
          padding: 0.85rem;
          gap: 1rem;
        }

        .hero {
          border-radius: 26px;
          padding: 1.1rem;
        }

        .hero-title {
          font-size: clamp(2.5rem, 12vw, 4.2rem);
        }

        .recommend-grid {
          grid-template-columns: 1fr;
        }

        .recommend-slot {
          min-height: 160px;
        }

        .footer {
          font-size: 0.72rem;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        html {
          scroll-behavior: auto;
        }

        .recommend-slot {
          transition: none;
        }

        .recommend-slot:hover {
          transform: none;
        }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <div class="page-inner">
        <section class="hero" aria-labelledby="hero-title">
          <div class="hero-grid">
            <div>
              <p class="eyebrow">오늘의 큐레이션</p>
              <h1 class="hero-title" id="hero-title"><strong>오늘의 추천</strong></h1>
              <p class="hero-copy">
                오늘 가장 먼저 볼 만한 것들을 한 장에 모아둔 랜딩페이지입니다.
                빠르게 훑어도 흐름이 보이도록 상단에는 핵심만, 하단에는 추천 카드 자리를
                깔끔하게 배치했습니다.
              </p>
            </div>

            <aside class="hero-aside" aria-label="오늘 날짜 정보">
              <p class="date-label">오늘 날짜</p>
              <p class="date-value" id="todayDate">2026년 6월 11일 목요일</p>
              <p class="date-note">
                매일 새롭게 갱신되는 추천을 담을 수 있도록
                상단을 단정하게 비워두었습니다.
              </p>
            </aside>
          </div>
        </section>
      </div>

      <div class="page-inner section" aria-labelledby="recommend-section-title">
        <div class="section-head">
          <div>
            <h2 class="section-title" id="recommend-section-title">추천 카드 자리</h2>
            <p class="section-subtitle">아래 4개 슬롯은 아직 비워두었습니다. 나중에 추천 콘텐츠를 채우면 됩니다.</p>
          </div>
        </div>

        <div class="recommend-grid" aria-label="추천 카드 4개 슬롯">
          <article class="recommend-slot" aria-label="추천 카드 1, 비어 있음"></article>
          <article class="recommend-slot" aria-label="추천 카드 2, 비어 있음"></article>
          <article class="recommend-slot" aria-label="추천 카드 3, 비어 있음"></article>
          <article class="recommend-slot" aria-label="추천 카드 4, 비어 있음"></article>
        </div>
      </div>

      <footer class="footer">
        <span>One-page landing</span>
        <span>Hero + 4 slots</span>
        <span>Local preview ready</span>
      </footer>
    </main>

    <p class="sr-only" aria-live="polite" id="announcement"></p>

    <script>
      (() => {
        const dateEl = document.getElementById("todayDate");
        const announcement = document.getElementById("announcement");
        const now = new Date();
        const formatted = new Intl.DateTimeFormat("ko-KR", {
          year: "numeric",
          month: "long",
          day: "numeric",
          weekday: "long"
        }).format(now);

        dateEl.textContent = formatted;
        announcement.textContent = `오늘 날짜는 ${formatted} 입니다.`;
      })();
    </script>
  </body>
</html>
